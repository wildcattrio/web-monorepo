<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Opening CalSmart AI…</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function () {
        var ua = navigator.userAgent || '';
        var isAndroid = /android/i.test(ua);
        var isIOS = /iphone|ipad|ipod/i.test(ua) ||
                    (/macintosh/i.test(ua) && navigator.maxTouchPoints > 1);

        var target =
          isAndroid ? 'https://play.google.com/store/apps/details?id=com.wildcattrio.calsmart' :
          isIOS     ? 'https://apps.apple.com/app/id6761125349' :
                      'https://calsmartai.wildcattrio.com/';

        window.location.replace(target);
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #121212;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        padding: 24px;
      }
      .brand { color: #38E07B; font-weight: 700; font-size: 18px; letter-spacing: 0.02em; }
      .msg { margin-top: 12px; opacity: 0.7; font-size: 15px; }
      .links { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }
      .links a {
        color: #38E07B;
        text-decoration: none;
        padding: 10px 18px;
        border: 1px solid rgba(56, 224, 123, 0.4);
        border-radius: 8px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">CalSmart AI</div>
      <div class="msg">Opening the app store…</div>
      <noscript>
        <div class="links">
          <a href="https://apps.apple.com/app/id6761125349">Download for iPhone / iPad</a>
          <a href="https://play.google.com/store/apps/details?id=com.wildcattrio.calsmart">Download for Android</a>
          <a href="https://calsmartai.wildcattrio.com/">Visit the website</a>
        </div>
      </noscript>
    </div>
  </body>
</html>
